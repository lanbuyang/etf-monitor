<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>台股 ETF KD 監控</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, "Helvetica Neue", Arial, sans-serif;
    background: #141414;
    color: #e9ecef;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    min-height: 100vh;
    padding: 40px 16px;
  }
  .card {
    background: #1e1e1e;
    border-radius: 16px;
    padding: 32px;
    width: 100%;
    max-width: 820px;
    box-shadow: 0 8px 32px rgba(0,0,0,.5);
  }
  h1 { font-size: 22px; color: #74c7ec; margin-bottom: 6px; }
  .subtitle { font-size: 13px; color: #555; margin-bottom: 24px; }
  table {
    width: 100%;
    border-collapse: collapse;
    border-radius: 10px;
    overflow: hidden;
  }
  thead tr { background: #2a2a2a; }
  th {
    padding: 12px 16px;
    text-align: left;
    font-size: 13px;
    color: #74c7ec;
    letter-spacing: .05em;
    font-weight: 600;
  }
  td {
    padding: 14px 16px;
    font-size: 15px;
    border-bottom: 1px solid #2a2a2a;
  }
  tr:last-child td { border-bottom: none; }
  .legend {
    display: flex;
    flex-wrap: wrap;
    gap: 16px;
    margin-top: 20px;
    font-size: 13px;
    color: #555;
  }
  .legend span { display: flex; align-items: center; gap: 6px; }
  .dot { width: 10px; height: 10px; border-radius: 50%; }
  .dot-sell  { background: #ff6b6b; }
  .dot-buy   { background: #69db7c; }
  .dot-hold  { background: #555; }
  .dot-mhold { background: #ffd43b; }
  .btn {
    margin-top: 20px;
    display: inline-block;
    padding: 8px 20px;
    background: #74c7ec;
    color: #141414;
    border-radius: 8px;
    font-weight: 600;
    font-size: 14px;
    cursor: pointer;
    border: none;
  }
  .btn:hover { background: #89dceb; }
  .btn:disabled { background: #444; color: #888; cursor: not-allowed; }
  .loading { color: #555; font-size: 14px; padding: 20px 0; }
  .error-row { color: #ffa94d; }
  #status { font-size: 12px; color: #555; margin-top: 8px; min-height: 18px; }
</style>
</head>
<body>
<div class="card">
  <h1>台股 ETF KD 監控</h1>
  <p class="subtitle" id="updated">載入中…</p>

  <table>
    <thead>
      <tr>
        <th>ETF</th>
        <th>K9 (原始)</th>
        <th style="color:#a78bfa">K9 (還原)</th>
        <th>D9</th>
        <th>收盤價</th>
        <th>訊號</th>
      </tr>
    </thead>
    <tbody id="tbody">
      <tr><td colspan="6" class="loading">資料載入中，請稍候…</td></tr>
    </tbody>
  </table>

  <div class="legend">
    <span><div class="dot dot-sell"></div> K9 &gt; 80 賣出</span>
    <span><div class="dot dot-buy"></div> K9 &lt; 30 買進</span>
    <span><div class="dot dot-mhold"></div> 當月出現過訊號 → 觀望</span>
    <span><div class="dot dot-hold"></div> 觀望</span>
  </div>
  <br>
  <button class="btn" id="refreshBtn" onclick="loadAll()">立即更新</button>
  <div id="status"></div>
</div>

<script>
const ETFS = [
  { ticker: "00757.TW",   name: "00757" },
  { ticker: "00631L.TW",  name: "00631L" },
  { ticker: "00662.TW",   name: "00662" },
  { ticker: "00864B.TWO", name: "00864B" },
  { ticker: "00719B.TWO", name: "00719B" },
  { ticker: "1301.TW",    name: "1301 台塑" },
  { ticker: "1326.TW",    name: "1326 台化" },
];

const KD_PERIOD      = 9;
const SELL_THRESHOLD = 80;
const BUY_THRESHOLD  = 30;

// CORS proxies fallback list
const PROXIES = [
  url => `https://corsproxy.io/?url=${encodeURIComponent(url)}`,
  url => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
];

async function fetchYF(ticker, adjusted) {
  const baseUrl = `https://query1.finance.yahoo.com/v8/finance/chart/${ticker}` +
    `?range=3mo&interval=1d&events=div,splits`;

  for (const proxy of PROXIES) {
    try {
      const res = await fetch(proxy(baseUrl), { signal: AbortSignal.timeout(12000) });
      if (!res.ok) continue;
      const json = await res.json();
      const result = json?.chart?.result?.[0];
      if (!result) continue;

      const timestamps = result.timestamp || [];
      const quote      = result.indicators?.quote?.[0] || {};
      const adjClose   = result.indicators?.adjclose?.[0]?.adjclose || [];

      const closes = adjusted ? adjClose : (quote.close || []);
      return {
        dates:  timestamps.map(t => new Date(t * 1000)),
        highs:  quote.high  || [],
        lows:   quote.low   || [],
        closes: closes,
        rawClose: (quote.close || []),
      };
    } catch (_) { /* try next proxy */ }
  }
  return null;
}

function calcKD(highs, lows, closes, period = 9) {
  const n = closes.length;
  const k = new Array(n).fill(50);
  const d = new Array(n).fill(50);

  for (let i = 1; i < n; i++) {
    const start = Math.max(0, i - period + 1);
    let lo = Infinity, hi = -Infinity;
    for (let j = start; j <= i; j++) {
      if (lows[j]  != null) lo = Math.min(lo, lows[j]);
      if (highs[j] != null) hi = Math.max(hi, highs[j]);
    }
    const rsv = (hi === lo || closes[i] == null)
      ? 50
      : ((closes[i] - lo) / (hi - lo)) * 100;
    k[i] = k[i-1] * (2/3) + rsv * (1/3);
    d[i] = d[i-1] * (2/3) + k[i] * (1/3);
  }
  return { k, d };
}

function thisMonthSignal(dates, kArr, threshold, compare) {
  const now    = new Date();
  const mStart = new Date(now.getFullYear(), now.getMonth(), 1);
  const today  = new Date(now.getFullYear(), now.getMonth(), now.getDate());

  for (let i = 0; i < dates.length; i++) {
    const d = dates[i];
    if (d >= mStart && d < today && compare(kArr[i], threshold)) return true;
  }
  return false;
}

const SIGNAL_STYLE = {
  "賣出":         { icon: "🔴", color: "#ff6b6b", bg: "#2d1b1b" },
  "買進":         { icon: "🟢", color: "#69db7c", bg: "#1b2d1e" },
  "觀望":         { icon: "⚪", color: "#adb5bd", bg: "#222" },
  "當月賣出觀望": { icon: "🟡", color: "#ffd43b", bg: "#2d2710" },
  "當月買進觀望": { icon: "🟡", color: "#ffd43b", bg: "#2d2710" },
  "資料不足":     { icon: "❓", color: "#adb5bd", bg: "#222" },
  "錯誤":         { icon: "⚠️", color: "#ffa94d", bg: "#2d2010" },
};

function fmt(v) { return v != null && !isNaN(v) ? v.toFixed(2) : "—"; }

async function processETF(etf) {
  try {
    const [raw, adj] = await Promise.all([
      fetchYF(etf.ticker, false),
      fetchYF(etf.ticker, true),
    ]);

    if (!raw || raw.closes.length < KD_PERIOD) {
      return { name: etf.name, k: null, kAdj: null, d: null, close: null, signal: "資料不足" };
    }

    const { k: kArr, d: dArr } = calcKD(raw.highs, raw.lows, raw.closes);
    const lk    = kArr[kArr.length - 1];
    const ld    = dArr[dArr.length - 1];
    const lc    = raw.rawClose[raw.rawClose.length - 1];

    let lkAdj = null, kAdjArr = null;
    if (adj && adj.closes.length >= KD_PERIOD) {
      const { k: ka } = calcKD(adj.highs, adj.lows, adj.closes);
      kAdjArr = ka;
      lkAdj   = ka[ka.length - 1];
    }

    const sigK    = lkAdj ?? lk;
    const sigDates = raw.dates;
    const sigKArr  = kAdjArr ?? kArr;

    const hadSell = thisMonthSignal(sigDates, sigKArr, SELL_THRESHOLD, (v, t) => v > t);
    const hadBuy  = thisMonthSignal(sigDates, sigKArr, BUY_THRESHOLD,  (v, t) => v < t);
    const hadSig  = hadSell || hadBuy;

    let signal;
    if (sigK > SELL_THRESHOLD)      signal = hadSig ? "當月賣出觀望" : "賣出";
    else if (sigK < BUY_THRESHOLD)  signal = hadSig ? "當月買進觀望" : "買進";
    else                            signal = "觀望";

    return { name: etf.name, k: lk, kAdj: lkAdj, d: ld, close: lc, signal };
  } catch (e) {
    return { name: etf.name, k: null, kAdj: null, d: null, close: null, signal: "錯誤" };
  }
}

function renderRow(row) {
  const s = SIGNAL_STYLE[row.signal] || SIGNAL_STYLE["錯誤"];
  return `<tr style="background:${s.bg}">
    <td style="color:#e9ecef;font-weight:600">${row.name}</td>
    <td style="color:${s.color};font-weight:700">${fmt(row.k)}</td>
    <td style="color:#a78bfa;font-size:13px">${fmt(row.kAdj)}</td>
    <td style="color:#868e96">${fmt(row.d)}</td>
    <td style="color:#e9ecef">${fmt(row.close)}</td>
    <td style="color:${s.color};font-weight:700">${s.icon} ${row.signal}</td>
  </tr>`;
}

async function loadAll() {
  const btn    = document.getElementById("refreshBtn");
  const tbody  = document.getElementById("tbody");
  const status = document.getElementById("status");

  btn.disabled = true;
  btn.textContent = "更新中…";
  status.textContent = "";

  // show placeholder rows
  tbody.innerHTML = ETFS.map(e =>
    `<tr><td style="color:#e9ecef;font-weight:600">${e.name}</td>` +
    `<td colspan="5" class="loading">載入中…</td></tr>`
  ).join("");

  // fetch all concurrently, update rows as they complete
  const rows = new Array(ETFS.length).fill(null);
  const promises = ETFS.map((etf, i) =>
    processETF(etf).then(row => {
      rows[i] = row;
      // update just this row
      const trs = tbody.querySelectorAll("tr");
      if (trs[i]) trs[i].outerHTML = renderRow(row);
      status.textContent = `已載入 ${rows.filter(Boolean).length} / ${ETFS.length}`;
    })
  );

  await Promise.all(promises);

  const now = new Date().toLocaleString("zh-TW", {
    year: "numeric", month: "2-digit", day: "2-digit",
    hour: "2-digit", minute: "2-digit", second: "2-digit", hour12: false,
  });
  document.getElementById("updated").textContent =
    `更新時間：${now}　　每小時自動刷新`;
  status.textContent = "✓ 所有資料已載入";
  btn.disabled = false;
  btn.textContent = "立即更新";
}

// Auto-refresh every hour
setInterval(loadAll, 3600 * 1000);

// Initial load
loadAll();
</script>
</body>
</html>
